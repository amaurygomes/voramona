<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vó Ramona | Menu Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script type="module">
        import { createDirectus, rest, readItems } from 'https://cdn.jsdelivr.net/npm/@directus/sdk@11.0.3/dist/index.js';
        window.DirectusSDK = { createDirectus, rest, readItems };
    </script>
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    colors: { primary: '#ff9800', accent: '#FBBF24', light: '#FDFCF9' },
                    fontFamily: { logo: ['"Great Vibes"', 'cursive'], sans: ['"Plus Jakarta Sans"', 'sans-serif'] }
                } 
            } 
        }
    </script>
    <style>
        [v-cloak] { display: none; }
        body { background-color: #F8F9FA; color: #333; }
        .font-logo { font-family: 'Great Vibes', cursive; text-transform: none !important; }
        .img-premium { object-fit: cover; width: 110px; height: 110px; border-radius: 50%; border: 4px solid white; box-shadow: 0 8px 20px rgba(0,0,0,0.06); background-color: #eee; }
        .pill-active { background-color: #ff9800; color: white; box-shadow: 0 4px 15px rgba(255, 152, 0, 0.4); }
        .slide-container { position: relative; height: 200px; overflow: hidden; border-radius: 2.5rem; background: #eee; }
        .slide-item { position: absolute; inset: 0; transition: opacity 1s ease; opacity: 0; }
        .slide-item.active { opacity: 1; }
        .item-card { border-radius: 2.5rem; transition: all 0.3s ease; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="font-sans text-gray-800">
    <div id="app" v-cloak>
        
        <header class="p-6 flex justify-between items-center bg-transparent">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-primary rounded-full flex items-center justify-center text-white font-black shadow-lg">VR</div>
                <h1 class="text-4xl font-logo text-primary mt-2">Vó Ramona</h1>
            </div>
            <button @click="verCarrinho = true" class="relative bg-white p-3 rounded-2xl shadow-sm border border-gray-100 active:scale-90 transition-transform">
                <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" stroke-width="2"/></svg>
                <span v-if="carrinho.length" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-black px-1.5 py-0.5 rounded-full">{{ totalItens }}</span>
            </button>
        </header>

        <main class="max-w-xl mx-auto px-6 pb-40">
            <div v-if="banners.length" class="slide-container mb-10 shadow-xl border-4 border-white">
                <div v-for="(imgId, idx) in banners" :key="idx" :class="['slide-item', { active: currentSlide === idx }]">
                    <img :src="getUrl(imgId)" class="w-full h-full object-cover">
                </div>
            </div>

            <div class="flex gap-3 mb-10 overflow-x-auto no-scrollbar justify-center">
                <button @click="tab = 'batatas'" :class="tab === 'batatas' ? 'pill-active' : 'bg-white text-gray-400'" class="px-8 py-3.5 rounded-full font-bold transition-all shadow-sm whitespace-nowrap italic">🍟 Batatas</button>
                <button @click="tab = 'bebidas'" :class="tab === 'bebidas' ? 'pill-active' : 'bg-white text-gray-400'" class="px-8 py-3.5 rounded-full font-bold transition-all shadow-sm whitespace-nowrap italic">🥤 Bebidas</button>
            </div>

            <div class="grid gap-6">
                <template v-if="tab === 'batatas'">
                    <div v-for="b in menu.batatas" :key="b.id" v-show="b.ativo">
                        <div class="item-card bg-white p-5 flex gap-5 shadow-sm border border-gray-100 relative overflow-hidden" :class="{'opacity-50 grayscale': b.esgotado}">
                            <img :src="getUrl(b.imagem)" class="img-premium">
                            <div class="flex-1 flex flex-col justify-between py-1 text-left">
                                <div>
                                    <h3 class="font-bold text-gray-900 text-lg leading-tight italic">{{ b.Nome }}</h3>
                                    <p class="text-[11px] text-gray-400 mt-2 line-clamp-2 italic leading-relaxed">{{ b.descricao }}</p>
                                </div>
                                <div class="flex justify-between items-center mt-4">
                                    <span class="text-xl font-black text-primary tracking-tighter italic">R$ {{ b.promocao || b.preco }}</span>
                                    <button @click="abrirModal(b)" :disabled="b.esgotado" class="bg-primary text-white p-2.5 rounded-2xl shadow-lg active:scale-95 transition-all">
                                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="3"/></svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>

                <template v-if="tab === 'bebidas'">
                    <div v-for="beb in menu.bebidas" :key="beb.id" v-show="beb.ativo">
                        <div class="item-card bg-white p-5 flex items-center gap-5 border border-gray-100 shadow-sm" :class="{'opacity-50 grayscale': beb.esgotado}">
                            <img :src="getUrl(beb.imagem)" class="w-14 h-14 rounded-2xl object-cover bg-gray-50">
                            <div class="flex-1 text-left">
                                <h3 class="font-bold text-gray-900 italic leading-none">{{ beb.nome }}</h3>
                                <span class="text-primary font-black text-lg italic mt-1 block">R$ {{ beb.promocao || beb.preco }}</span>
                            </div>
                            <button @click="addBebida(beb)" :disabled="beb.esgotado" class="bg-gray-100 text-primary w-11 h-11 rounded-2xl font-black text-2xl active:scale-90">+</button>
                        </div>
                    </div>
                </template>
            </div>
        </main>

        <footer class="fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-xl p-6 z-40 flex justify-center gap-16 border-t border-gray-100 rounded-t-[3rem] shadow-2xl">
            <a v-if="config.instagram" :href="config.instagram" target="_blank" class="text-primary hover:scale-110 transition-all">
                <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
            </a>
            <a v-if="config.whatsapp" :href="`https://wa.me/55${config.whatsapp.replace(/\D/g,'')}`" target="_blank" class="text-primary hover:scale-110 transition-all">
                <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.588-5.946 0-6.556 5.332-11.891 11.893-11.891 3.181 0 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.481 8.417 0 6.556-5.333 11.892-11.893 11.892-1.997 0-3.951-.5-5.688-1.448l-6.305 1.652zm6.599-3.835c1.516.899 3.197 1.374 4.918 1.374 5.4 0 9.794-4.395 9.794-9.796 0-2.617-1.02-5.077-2.871-6.928s-4.312-2.87-6.932-2.87c-5.4 0-9.794 4.395-9.794 9.796 0 1.753.47 3.46 1.36 4.974l-.101.161-1.116 4.075 4.178-1.095.163-.1z"/></svg>
            </a>
        </footer>

        </div>

    <script>
        const { createApp, ref, reactive, onMounted, computed } = Vue;
        createApp({
            setup() {
                const tab = ref('batatas'); const modalAberto = ref(false); const verCarrinho = ref(false);
                const currentSlide = ref(0); const banners = ref([]); const qtdTemp = ref(1);
                const config = reactive({ logo: null, instagram: '', facebook: '', whatsapp: '' });
                const menu = reactive({ batatas: [], bebidas: [], adicionais: [] });
                const carrinho = ref([]); const itemAtual = ref(null); const adicionaisSelecionados = ref([]);
                const form = reactive({ nome_cliente: '', whatsapp_cliente: '', endereco: '', pagamento: 'pix', troco: false, troco_para: '' });

                // FUNÇÃO CHAVE PARA AS IMAGENS
                const getUrl = (id) => {
                    if (!id) return '';
                    return `https://painel.voramona.com.br/assets/${id}`;
                };

                const totalPedido = computed(() => carrinho.value.reduce((acc, i) => acc + (i.preco_total * i.quantidade), 0));
                const totalItens = computed(() => carrinho.value.reduce((acc, i) => acc + i.quantidade, 0));

                const mascararTelefone = (e) => {
                    let v = e.target.value.replace(/\D/g, "");
                    if (v.length > 11) v = v.substring(0, 11);
                    if (v.length > 10) v = v.replace(/^(\d{2})(\d{5})(\d{4})/, "($1) $2-$3");
                    else if (v.length > 2) v = v.replace(/^(\d{2})(\d*)/, "($1) $2");
                    form.whatsapp_cliente = v;
                };

                onMounted(async () => {
                    setInterval(() => { if(banners.value.length) currentSlide.value = (currentSlide.value + 1) % banners.value.length; }, 5000);
                    while (!window.DirectusSDK) await new Promise(r => setTimeout(r, 50));
                    const sdk = window.DirectusSDK;
                    const client = sdk.createDirectus('https://painel.voramona.com.br').with(sdk.rest());
                    try {
                        const [batatas, bebidas, adicionais, settings, bnr] = await Promise.all([
                            client.request(sdk.readItems('Batatas')), client.request(sdk.readItems('bebidas')),
                            client.request(sdk.readItems('adicionais')), client.request(sdk.readItems('configuracao')),
                            client.request(sdk.readItems('banner'))
                        ]);
                        menu.batatas = batatas || []; menu.bebidas = bebidas || []; menu.adicionais = adicionais || [];
                        if(settings.length) Object.assign(config, settings[settings.length-1]);
                        if(bnr.length) banners.value = [bnr[0].imagem_1, bnr[0].imagen_2, bnr[0].imagem_3].filter(id => id);
                    } catch (e) { console.error(e); }
                });

                const abrirModal = (b) => { itemAtual.value = b; adicionaisSelecionados.value = []; qtdTemp.value = 1; modalAberto.value = true; };
                const confirmarItem = () => {
                    const extras = menu.adicionais.filter(a => adicionaisSelecionados.value.includes(a.id));
                    const pAdd = extras.reduce((acc, a) => acc + parseFloat(a.preco || 0), 0);
                    const pBase = parseFloat(itemAtual.value.promocao || itemAtual.value.preco || 0);
                    carrinho.value.push({ id: itemAtual.value.id, nome: itemAtual.value.Nome, quantidade: qtdTemp.value, preco_total: pBase + pAdd, detalhes: extras.map(e => e.nome).join(', ') || 'Tradicional' });
                    modalAberto.value = false;
                };
                const addBebida = (b) => { carrinho.value.push({ id: b.id, nome: b.nome, quantidade: 1, preco_total: parseFloat(b.promocao || b.preco || 0), detalhes: 'Gelada' }); };
                const removerItem = (i) => carrinho.value.splice(i, 1);

                const finalizarPedidoZap = () => {
                    const numeroLoja = config.whatsapp.replace(/\D/g, ''); 
                    let msg = `*NOVO PEDIDO - VÓ RAMONA*\n\n*Cliente:* ${form.nome_cliente}\n*ITENS:*\n`;
                    carrinho.value.forEach(i => { msg += `• ${i.quantidade}x ${i.nome} - R$ ${(i.preco_total * i.quantidade).toFixed(2)}\n`; });
                    msg += `\n*TOTAL: R$ ${totalPedido.value.toFixed(2)}*\n*PAGAMENTO:* ${form.pagamento.toUpperCase()}`;
                    window.open(`https://wa.me/5567991044105?text=${encodeURIComponent(msg)}`, '_blank');
                };

                return { getUrl, config, tab, banners, currentSlide, modalAberto, verCarrinho, menu, carrinho, itemAtual, adicionaisSelecionados, totalPedido, totalItens, form, qtdTemp, abrirModal, confirmarItem, addBebida, removerItem, mascararTelefone, finalizarPedidoZap };
            }
        }).mount('#app');
    </script>
</body>
</html>
