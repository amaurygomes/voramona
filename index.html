<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vó Ramona | Cardápio Digital</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script type="module">
        import { createDirectus, rest, readItems } from 'https://cdn.jsdelivr.net/npm/@directus/sdk@11.0.3/dist/index.js';
        window.DirectusSDK = { createDirectus, rest, readItems };
    </script>
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    colors: { primary: '#6B7A5F', accent: '#F59E0B', light: '#FDFCF9' },
                    fontFamily: { logo: ['"Great Vibes"'], sans: ['"Plus Jakarta Sans"'] }
                } 
            } 
        }
    </script>
    <style>
        [v-cloak] { display: none; }
        body { background-color: #F8F9FA; }
        .img-premium { object-fit: cover; width: 100px; height: 100px; border-radius: 50%; border: 4px solid white; box-shadow: 0 8px 20px rgba(0,0,0,0.06); }
        .pill-active { background-color: #6B7A5F; color: white; box-shadow: 0 4px 15px rgba(107, 122, 95, 0.3); }
        .slide-container { position: relative; height: 180px; overflow: hidden; border-radius: 2.5rem; }
        .slide-item { position: absolute; inset: 0; transition: opacity 1s ease; opacity: 0; }
        .slide-item.active { opacity: 1; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="font-sans text-gray-800">
    <div id="app" v-cloak>
        
        <header class="p-6 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-primary rounded-full flex items-center justify-center text-white font-black shadow-lg">VR</div>
                <h1 class="text-4xl font-logo text-primary lowercase">Vó Ramona</h1>
            </div>
            <button @click="verCarrinho = true" class="relative bg-white p-3 rounded-2xl shadow-sm border border-gray-100">
                <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" stroke-width="2"/></svg>
                <span v-if="carrinho.length" class="absolute -top-1 -right-1 bg-accent text-white text-[10px] font-black px-1.5 py-0.5 rounded-full">{{ totalItens }}</span>
            </button>
        </header>

        <main class="max-w-xl mx-auto px-6 pb-40">
            <div v-if="banners.length" class="slide-container mb-8 shadow-xl border-4 border-white">
                <div v-for="(imgId, idx) in banners" :key="idx" :class="['slide-item', { active: currentSlide === idx }]">
                    <img :src="`https://painel.voramona.com.br/assets/${imgId}?fit=cover&width=600`" class="w-full h-full object-cover">
                </div>
            </div>

            <div class="flex gap-3 mb-8 overflow-x-auto no-scrollbar justify-center">
                <button @click="tab = 'batatas'" :class="tab === 'batatas' ? 'pill-active' : 'bg-white text-gray-400'" class="px-8 py-3 rounded-full font-bold transition-all shadow-sm italic">🍟 Batatas</button>
                <button @click="tab = 'bebidas'" :class="tab === 'bebidas' ? 'pill-active' : 'bg-white text-gray-400'" class="px-8 py-3 rounded-full font-bold transition-all shadow-sm italic">🥤 Bebidas</button>
            </div>

            <div class="grid gap-4">
                <template v-if="tab === 'batatas'">
                    <div v-for="b in menu.batatas" :key="b.id" v-show="b.ativo">
                        <div class="bg-white p-4 rounded-[2.5rem] flex gap-4 border border-gray-100" :class="{'opacity-50 grayscale': b.esgotado}">
                            <img :src="`https://painel.voramona.com.br/assets/${b.imagem}?width=150`" class="img-premium">
                            <div class="flex-1 flex flex-col justify-between py-1 text-left">
                                <h3 class="font-bold text-gray-900 text-lg leading-tight">{{ b.Nome }}</h3>
                                <p class="text-[11px] text-gray-400 line-clamp-2 italic">{{ b.descricao }}</p>
                                <div class="flex justify-between items-center mt-2">
                                    <span class="text-xl font-black text-primary italic">R$ {{ b.promocao || b.preco }}</span>
                                    <button @click="abrirModal(b)" :disabled="b.esgotado" class="bg-primary text-white p-2.5 rounded-2xl active:scale-90 shadow-lg">+</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>

                <template v-if="tab === 'bebidas'">
                    <div v-for="beb in menu.bebidas" :key="beb.id" v-show="beb.ativo">
                        <div class="bg-white p-5 rounded-[2rem] flex items-center gap-5 border border-gray-100" :class="{'opacity-50 grayscale': beb.esgotado}">
                            <img :src="`https://painel.voramona.com.br/assets/${beb.imagem}?width=100`" class="w-14 h-14 rounded-2xl object-cover">
                            <div class="flex-1 text-left">
                                <h3 class="font-bold text-gray-900">{{ beb.nome }}</h3>
                                <span class="text-accent font-black">R$ {{ beb.promocao || beb.preco }}</span>
                            </div>
                            <button @click="addBebida(beb)" :disabled="beb.esgotado" class="bg-gray-100 text-primary w-11 h-11 rounded-2xl font-black text-2xl active:scale-90">+</button>
                        </div>
                    </div>
                </template>
            </div>
        </main>

        <footer class="fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-xl p-6 z-40 flex justify-center gap-16 border-t border-gray-100 rounded-t-[3rem] shadow-2xl">
            <a v-if="config.facebook" :href="config.facebook" target="_blank" class="text-gray-400 hover:text-blue-600 transition-all flex flex-col items-center gap-1">
                <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M9 8h-3v4h3v12h5v-12h3.642l.358-4h-4v-1.667c0-.955.192-1.333 1.115-1.333h2.885v-5h-3.808c-3.596 0-5.192 1.583-5.192 4.615v3.385z"/></svg>
                <span class="text-[8px] font-black uppercase tracking-widest italic text-gray-400">Facebook</span>
            </a>
            <a v-if="config.whatsapp" :href="`https://wa.me/55${config.whatsapp}`" target="_blank" class="text-gray-400 hover:text-green-500 transition-all flex flex-col items-center gap-1">
                <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.588-5.946 0-6.556 5.332-11.891 11.893-11.891 3.181 0 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.481 8.417 0 6.556-5.333 11.892-11.893 11.892-1.997 0-3.951-.5-5.688-1.448l-6.305 1.652zm6.599-3.835c1.516.899 3.197 1.374 4.918 1.374 5.4 0 9.794-4.395 9.794-9.796 0-2.617-1.02-5.077-2.871-6.928s-4.312-2.87-6.932-2.87c-5.4 0-9.794 4.395-9.794 9.796 0 1.753.47 3.46 1.36 4.974l-.101.161-1.116 4.075 4.178-1.095.163-.1z"/></svg>
                <span class="text-[8px] font-black uppercase tracking-widest italic text-gray-400">WhatsApp</span>
            </a>
        </footer>

        <div v-if="modalAberto" class="fixed inset-0 bg-gray-900/40 backdrop-blur-md z-[110] flex items-end justify-center">
            <div class="bg-white w-full max-w-lg rounded-t-[4rem] p-10 shadow-2xl text-left">
                <div class="flex justify-between items-start mb-6">
                    <h2 class="text-3xl font-black text-gray-900 italic leading-none">{{ itemAtual?.Nome }}</h2>
                    <button @click="modalAberto = false" class="text-gray-400 text-3xl">&times;</button>
                </div>
                <div class="flex items-center justify-between bg-gray-50 p-6 rounded-3xl mb-8">
                    <span class="text-xs font-bold uppercase text-gray-400 italic">Quantidade</span>
                    <div class="flex items-center gap-6">
                        <button @click="qtdTemp > 1 && qtdTemp--" class="w-10 h-10 bg-white rounded-xl shadow-sm font-black text-primary">-</button>
                        <span class="font-black text-2xl">{{ qtdTemp }}</span>
                        <button @click="qtdTemp++" class="w-10 h-10 bg-white rounded-xl shadow-sm font-black text-primary">+</button>
                    </div>
                </div>
                <div class="space-y-2 max-h-[30vh] overflow-y-auto mb-10 pr-2 no-scrollbar">
                    <div v-for="add in menu.adicionais" :key="add.id">
                        <label v-if="add.ativo" class="flex items-center justify-between p-4 bg-gray-50 rounded-3xl transition-all" :class="adicionaisSelecionados.includes(add.id) ? 'ring-2 ring-primary' : ''">
                            <div class="flex items-center gap-3">
                                <input type="checkbox" :value="add.id" v-model="adicionaisSelecionados" class="w-5 h-5 accent-primary">
                                <span class="font-bold text-gray-700 text-xs uppercase">{{ add.nome }}</span>
                            </div>
                            <span class="font-black text-primary text-sm">+ R$ {{ add.preco }}</span>
                        </label>
                    </div>
                </div>
                <button @click="confirmarItem" class="w-full bg-primary text-white font-black py-6 rounded-[2.5rem] text-xl shadow-xl active:scale-95 italic transition-all">Confirmar e Adicionar</button>
            </div>
        </div>

        <div v-if="verCarrinho" class="fixed inset-0 z-[120] flex justify-end">
            <div class="absolute inset-0 bg-gray-900/10 backdrop-blur-sm" @click="verCarrinho = false"></div>
            <div class="relative w-full max-w-md bg-white p-8 overflow-y-auto shadow-2xl flex flex-col rounded-l-[3rem]">
                <div class="flex justify-between items-center mb-10">
                    <h2 class="text-3xl font-black text-gray-900 italic tracking-tighter leading-none">Sua Sacola</h2>
                    <button @click="verCarrinho = false" class="bg-gray-100 text-gray-500 p-2 rounded-full hover:bg-gray-200">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2.5"></path></svg>
                    </button>
                </div>

                <div class="flex-1 space-y-4 no-scrollbar">
                    <div v-for="(item, index) in carrinho" :key="index" class="bg-gray-50 p-6 rounded-[2.5rem] relative text-left">
                        <button @click="removerItem(index)" class="absolute top-4 right-4 text-gray-300 font-bold text-xs uppercase hover:text-red-500">Remover</button>
                        <p class="text-[10px] font-black text-primary uppercase mb-1">{{ item.quantidade }}x Unidade(s)</p>
                        <h3 class="font-bold text-gray-900 text-lg leading-tight italic">{{ item.nome }}</h3>
                        <p class="text-[10px] text-gray-400 mt-2 italic leading-tight">{{ item.detalhes }}</p>
                        <p class="font-black text-gray-900 mt-4 text-lg">R$ {{ (item.preco_total * item.quantidade).toFixed(2) }}</p>
                    </div>
                </div>

                <div v-if="carrinho.length" class="mt-8 space-y-4 border-t border-gray-100 pt-8 text-left pb-10">
                    <div class="space-y-3">
                        <input type="text" v-model="form.nome_cliente" placeholder="Qual seu nome?" class="w-full bg-gray-50 p-5 rounded-2xl border border-gray-100 outline-none focus:ring-1 ring-primary font-bold italic placeholder:text-gray-400">
                        <input type="text" v-model="form.Cliente" @input="mascararTelefone" placeholder="WhatsApp (00) 00000-0000" class="w-full bg-gray-50 p-5 rounded-2xl border border-gray-100 outline-none focus:ring-1 ring-primary font-bold italic placeholder:text-gray-400">
                        <textarea v-model="form.endereco" rows="2" placeholder="Endereço de Entrega Completo" class="w-full bg-gray-50 p-5 rounded-2xl border border-gray-100 outline-none focus:ring-1 ring-primary font-bold italic placeholder:text-gray-400"></textarea>
                    </div>
                    
                    <div class="pt-4 space-y-4">
                        <label class="text-[10px] font-black text-gray-400 uppercase ml-2 tracking-widest italic leading-none">Pagamento</label>
                        <div class="flex gap-2">
                            <button v-for="opc in ['pix', 'dinheiro', 'cartao']" @click="form.pagamento = opc" :class="form.pagamento === opc ? 'bg-primary text-white shadow-lg' : 'bg-gray-50 text-gray-400 border-gray-100'" class="flex-1 py-4 rounded-xl border text-[10px] font-black uppercase transition-all">{{ opc }}</button>
                        </div>
                        
                        <div v-if="form.pagamento === 'dinheiro'" class="bg-primary/5 p-5 rounded-3xl border border-primary/10">
                            <div class="flex items-center justify-between">
                                <span class="text-[10px] uppercase font-black text-primary italic">Precisa de troco?</span>
                                <button @click="form.troco = !form.troco" :class="form.troco ? 'bg-primary text-white' : 'bg-white text-gray-300'" class="px-4 py-2 rounded-xl text-[10px] font-black uppercase shadow-sm transition-all">{{ form.troco ? 'SIM' : 'NÃO' }}</button>
                            </div>
                            <input v-if="form.troco" type="text" v-model="form.troco_para" placeholder="Troco para quanto?" class="w-full bg-white border border-gray-100 rounded-xl p-3 mt-4 text-sm text-gray-900 italic outline-none focus:ring-1 ring-primary">
                        </div>
                    </div>

                    <div class="flex justify-between items-center mb-6 pt-4 italic font-black leading-none">
                        <span class="text-xs uppercase text-gray-400 tracking-widest">Total</span>
                        <span class="text-4xl text-gray-900 tracking-tighter">R$ {{ totalPedido.toFixed(2) }}</span>
                    </div>
                    
                    <button @click="enviarWhatsApp" :disabled="!form.Cliente || !form.nome_cliente || !form.endereco" class="w-full bg-gray-900 text-white font-black py-6 rounded-[2.5rem] text-xl shadow-xl disabled:opacity-20 active:scale-95 transition-all italic tracking-tighter">Enviar pelo WhatsApp</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, reactive, onMounted, computed } = Vue;
        createApp({
            setup() {
                const tab = ref('batatas'); const modalAberto = ref(false); const verCarrinho = ref(false);
                const currentSlide = ref(0); const banners = ref([]); const qtdTemp = ref(1);
                const config = reactive({ logo: null, instagram: '', facebook: '', whatsapp: '', horario_inicio: '', horario_fim: '' });
                const menu = reactive({ batatas: [], bebidas: [], adicionais: [] });
                const carrinho = ref([]); const itemAtual = ref(null); const adicionaisSelecionados = ref([]);
                const form = reactive({ nome_cliente: '', Cliente: '', endereco: '', pagamento: 'pix', troco: false, troco_para: '' });

                const totalPedido = computed(() => carrinho.value.reduce((acc, i) => acc + (i.preco_total * i.quantidade), 0));
                const totalItens = computed(() => carrinho.value.reduce((acc, i) => acc + i.quantidade, 0));

                const mascararTelefone = (e) => {
                    let v = e.target.value.replace(/\D/g, "");
                    v = v.replace(/^(\d{2})(\d)/g, "($1) $2");
                    v = v.replace(/(\d)(\d{4})$/, "$1-$2");
                    form.Cliente = v.substring(0, 15);
                };

                onMounted(async () => {
                    setInterval(() => { if(banners.value.length) currentSlide.value = (currentSlide.value + 1) % banners.value.length; }, 5000);
                    while (!window.DirectusSDK) await new Promise(r => setTimeout(r, 50));
                    const sdk = window.DirectusSDK;
                    const client = sdk.createDirectus('https://painel.voramona.com.br').with(sdk.rest());
                    try {
                        const [batatas, bebidas, adicionais, settings, bnr] = await Promise.all([
                            client.request(sdk.readItems('Batatas')), client.request(sdk.readItems('bebidas')),
                            client.request(sdk.readItems('adicionais')), client.request(sdk.readItems('configuracao')),
                            client.request(sdk.readItems('banner'))
                        ]);
                        menu.batatas = batatas || []; menu.bebidas = bebidas || []; menu.adicionais = adicionais || [];
                        if(settings.length) Object.assign(config, settings[settings.length-1]);
                        if(bnr.length) banners.value = [bnr[0].imagem_1, bnr[0].imagen_2, bnr[0].imagem_3].filter(id => id);
                    } catch (e) { console.error(e); }
                });

                const abrirModal = (b) => { itemAtual.value = b; adicionaisSelecionados.value = []; qtdTemp.value = 1; modalAberto.value = true; };
                const confirmarItem = () => {
                    const extras = menu.adicionais.filter(a => adicionaisSelecionados.value.includes(a.id));
                    const pAdd = extras.reduce((acc, a) => acc + parseFloat(a.preco || 0), 0);
                    const pBase = parseFloat(itemAtual.value.promocao || itemAtual.value.preco || 0);
                    carrinho.value.push({ id: itemAtual.value.id, nome: itemAtual.value.Nome, quantidade: qtdTemp.value, preco_total: pBase + pAdd, detalhes: extras.map(e => e.nome).join(', ') || 'Tradicional' });
                    modalAberto.value = false;
                };
                const addBebida = (b) => { carrinho.value.push({ id: b.id, nome: b.nome, quantidade: 1, preco_total: parseFloat(b.promocao || b.preco || 0), detalhes: 'Gelada' }); };
                const removerItem = (i) => carrinho.value.splice(i, 1);

                const enviarWhatsApp = () => {
                    let msg = `*NOVO PEDIDO - VÓ RAMONA*\n\n`;
                    msg += `*Cliente:* ${form.nome_cliente}\n`;
                    msg += `*WhatsApp:* ${form.Cliente}\n\n`;
                    msg += `*ITENS:*\n`;
                    carrinho.value.forEach(i => {
                        msg += `• ${i.quantidade}x ${i.nome} (${i.detalhes}) - R$ ${(i.preco_total * i.quantidade).toFixed(2)}\n`;
                    });
                    msg += `\n*TOTAL: R$ ${totalPedido.value.toFixed(2)}*`;
                    msg += `\n\n*ENTREGA:* ${form.endereco}`;
                    msg += `\n*PAGAMENTO:* ${form.pagamento.toUpperCase()}`;
                    if(form.troco) msg += `\n*TROCO PARA:* R$ ${form.troco_para}`;

                    const url = `https://wa.me/55${config.whatsapp}?text=${encodeURIComponent(msg)}`;
                    window.open(url, '_blank');
                };

                return { config, tab, banners, currentSlide, modalAberto, verCarrinho, menu, carrinho, itemAtual, adicionaisSelecionados, totalPedido, totalItens, form, qtdTemp, abrirModal, confirmarItem, addBebida, removerItem, mascararTelefone, enviarWhatsApp };
            }
        }).mount('#app');
    </script>
</body>
</html>
